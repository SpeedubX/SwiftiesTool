<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWP Tool</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Orbitron', sans-serif;
}

/* ✅ FULL SCREEN GRADIENT FIX */
body {
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(180deg, #0a1a2f 0%, #02070f 70%, #001f30 100%);
    color: white;
    position: relative;
}

/* ⭐ PARTICLES */
canvas {
    position: absolute;
    top: 0;
    left: 0;
    z-index: 0;
}

/* 🔵 ORBS */
.orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.6;
    animation: float 14s infinite ease-in-out;
}

.orb1 { width: 300px; height: 300px; background: #00e0ff; top: 10%; left: 10%; }
.orb2 { width: 220px; height: 220px; background: #0077ff; bottom: 10%; right: 15%; animation-delay: 3s; }
.orb3 { width: 350px; height: 350px; background: #0044ff; top: 40%; right: 5%; animation-delay: 6s; }

@keyframes float {
    0% { transform: translate(0,0); }
    50% { transform: translate(40px,-60px); }
    100% { transform: translate(0,0); }
}

/* 🔥 CYAN GLOW (enhanced) */
.bottom-glow {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 1200px;
    height: 800px;
    background: radial-gradient(circle at center, rgba(0,255,255,0.25) 0%, rgba(0,255,255,0) 80%);
    filter: blur(160px);
    animation: pulse 6s infinite ease-in-out;
    z-index: 1;
}

@keyframes pulse {
    0%,100% { transform: translateX(-50%) scale(1); }
    50% { transform: translateX(-50%) scale(1.1); }
}

/* NAVBAR */
.navbar {
    position: relative;
    z-index: 2;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 25px 50px;
}

.logo {
    font-size: 26px;
    font-weight: bold;
    letter-spacing: 2px;
    background: linear-gradient(90deg,#00e0ff,#0077ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.discord-btn {
    background: linear-gradient(135deg,#5865F2,#3c45a5);
    padding: 12px 22px;
    border-radius: 14px;
    border: none;
    color: white;
    cursor: pointer;
    transition: 0.25s;
    box-shadow: 0 0 15px rgba(88,101,242,0.5);
    margin-left: 10px;
}

.discord-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 25px rgba(88,101,242,0.9);
}

/* MAIN */
.container {
    position: relative;
    z-index: 2;
    text-align: center;
    margin-top: 120px;
}

.title {
    font-size: 70px;
    font-weight: bold;
    background: linear-gradient(90deg,#00f0ff,#0077ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.subtitle {
    color: #8fa3b0;
    margin-bottom: 50px;
}

/* BOX */
.box {
    width: 520px;
    max-width: 90%;
    margin: auto;
    padding: 35px;
    border-radius: 24px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(30px);
    box-shadow: 0 0 70px rgba(0,200,255,0.25);
    transition: 0.3s;
}

.box:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 120px rgba(0,200,255,0.5);
}

textarea {
    width: 100%;
    height: 140px;
    border-radius: 14px;
    border: none;
    padding: 15px;
    background: rgba(255,255,255,0.08);
    color: white;
    outline: none;
    font-size: 14px;
    resize: none;
}

textarea:focus {
    box-shadow: 0 0 15px rgba(0,200,255,0.5);
}

.submit {
    margin-top: 18px;
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg,#1f6feb,#155bc1);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.25s;
    box-shadow: 0 0 20px rgba(0,120,255,0.4);
}

.submit:hover {
    transform: scale(1.05);
    box-shadow: 0 0 35px rgba(0,120,255,0.8);
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="bottom-glow"></div>

<!-- ✅ Navbar with Help button -->
<div class="navbar">
    <div class="logo">AWP Tool</div>
    <div>
        <button class="discord-btn" onclick="joinDiscord()">Join Discord</button>
        <button class="discord-btn" onclick="openHelp()">Help</button>
    </div>
</div>

<div class="container">
    <div class="title">AWP Tool</div>
    <div class="subtitle">Team Work With Swifties</div>

    <div class="box">
        <textarea id="msg" placeholder="Enter your file..."></textarea>
        <button class="submit" onclick="send()">Send</button>
    </div>
</div>

<script>
function joinDiscord() {
    window.open("https://discord.gg/HMPBbdJQkE", "_blank");
}

// ✅ Help button function
function openHelp() {
    const discordID = "1269285660834140215"; // replace this with your Discord ID
    window.open(`https://discord.com/users/${discordID}`, "_blank");
}

const WEBHOOK_URL = "https://discord.com/api/webhooks/1495457284661182605/EfQWkbmvPXlXrEVZqUK1CU4gaQDM-ywG7O-I88aPOk3ibKJzql08SE3BPljDt4ALhyyW";

function send() {
    const message = document.getElementById("msg").value;
    if (!message) { alert("Type something first"); return; }

    fetch(WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ content: message })
    })
    .then(() => { alert("Sent!"); document.getElementById("msg").value = ""; })
    .catch(() => alert("Error sending"));
}

/* ✨ PARTICLES */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
for (let i = 0; i < 120; i++) {
    particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*2, speed: Math.random()*0.5 });
}

function animate() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p => {
        p.y -= p.speed;
        if (p.y < 0) p.y = canvas.height;
        ctx.fillStyle = "white";
        ctx.fillRect(p.x, p.y, p.size, p.size);
    });
    requestAnimationFrame(animate);
}
animate();

window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
